<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okoya Worker Registration (HR System)</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

/* =========================
   GLOBAL RESET
========================= */
body {
    background: #f3f6fb;
    font-family: Arial, sans-serif;
}

/* =========================
   MAIN CONTAINER
========================= */
.register-container {
    max-width: 1000px;
    margin: 20px auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    border: 1px solid #ddd;
}

/* =========================
   BACK BUTTON
========================= */
.back-dashboard a {
    text-decoration: none;
    font-weight: bold;
    color: #004080;
}
.back-dashboard a:hover {
    text-decoration: underline;
}

/* =========================
   HEADER
========================= */
.official-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 2px solid #004080;
    padding-bottom: 15px;
}

.company-logo img,
.passport-preview img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.official-header {
    flex: 1;
    text-align: center;
}

.company-name {
    color: #0a7a0a;
    font-size: 1.8rem;
    margin: 0;
}

.company-motto {
    color: goldenrod;
    font-size: 0.95rem;
}

.company-address {
    background: black;
    color: white;
    display: inline-block;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.85rem;
}

/* =========================
   FORM LAYOUT
========================= */
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px 25px;
    margin-top: 20px;
}

.form-section-title {
    grid-column: span 2;
    font-weight: bold;
    color: #004080;
    margin-top: 10px;
    border-left: 4px solid #004080;
    padding-left: 8px;
}

label {
    font-weight: bold;
    font-size: 13px;
    display: block;
    margin-bottom: 4px;
    color: #111;
}

input {
    width: 100%;
    padding: 7px;
    border: 1px solid #bbb;
    border-radius: 6px;
    outline: none;
}

input:focus {
    border-color: #004080;
    box-shadow: 0 0 5px rgba(0,64,128,0.2);
}

/* =========================
   VALIDATION STATES
========================= */
.invalid {
    border: 2px solid red !important;
}

.valid {
    border: 2px solid green !important;
}

/* =========================
   LIVE INFO BOX
========================= */
.info-box {
    background: #eef6ff;
    padding: 10px;
    border-left: 5px solid #004080;
    margin-top: 10px;
    font-size: 13px;
}

/* =========================
   BUTTONS
========================= */
.form-submit {
    text-align: center;
    margin-top: 25px;
}

.form-submit button,
.form-submit input {
    padding: 10px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin: 5px;
}

.form-submit button {
    background: #004080;
    color: white;
}

.form-submit button:hover {
    background: #0066cc;
}

/* =========================
   PASSPORT UPLOAD
========================= */
.passport-box {
    margin-top: 10px;
}

/* =========================
   PRINT MODE
========================= */
@media print {

    @page {
        size: A4;
        margin: 10mm;
    }

    /* hide UI elements */
    .back-dashboard,
    .no-print {
        display: none !important;
    }

    html, body {
        width: 100%;
        height: auto;
        overflow: visible;
    }

    .register-container {
        width: 100%;
        max-width: 100%;
        margin: 0;
        padding: 10px;
        box-shadow: none;
        border: none;
    }

    /* prevent cutting tables/forms */
    .form-grid,
    table,
    tr,
    td {
        break-inside: avoid;
    }

    .form-submit {
        display: none !important; /* optional: hide print/register buttons */
    }

    * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
}

</style>
</head>

<body>

<div class="back-dashboard no-print">
    <a href="{{ url_for('admin_dashboard') }}">← Back to Dashboard</a>
</div>

<div class="register-container">

<!-- HEADER -->
<div class="official-header-row">

    <div class="company-logo">
        <img src="{{ url_for('static', filename='android-chrome-512x512.png') }}">
    </div>

    <div class="official-header">
        <h1 class="company-name">OKOYA FOOD COMPANY LIMITED</h1>
        <h3 class="company-motto">POVERTY ERADICATION • EQUALITY • PRODUCTIVITY</h3>
        <p class="company-address">Shaki, Oyo State, Nigeria</p>
        <h3>WORKER REGISTRATION SYSTEM</h3>
    </div>

    <div class="passport-preview">
        <img id="passportPreview">
    </div>

</div>

<!-- LIVE INFO -->
<div class="info-box">
    Age: <span id="ageDisplay">--</span> |
    Salary Status: <span id="salaryStatus">Pending</span> |
    NIN Status: <span id="ninStatus">Not Verified</span>
</div>


<!-- FORM -->
<form method="POST" action="{{ url_for('register_worker') }}" enctype="multipart/form-data">
<!-- PASSPORT -->
<div class="passport-box no-print">
    <label>Upload Passport</label>
    <input type="file" id="passport" name="passport" accept="image/*">
</div>

<div class="form-grid">

    <div class="form-section-title">Personal Information</div>

    <div>
        <label>Name *</label>
        <input name="name" required>
    </div>

    <div>
        <label>Phone *</label>
        <input name="phone_number" required>
    </div>

    <div>
        <label>Date of Birth *</label>
        <input type="date" id="dob" name="date_of_birth" required>
    </div>

    <div>
        <label>Gender</label>
        <input name="gender">
    </div>

    <div class="form-section-title">Identity Verification</div>

    <div>
        <label>NIN Number *</label>
        <input id="nin" name="national_id" required>
    </div>

    <div>
        <label>Nationality</label>
        <input name="nationality">
    </div>

    <div class="form-section-title">Employment</div>

    <div>
        <label>Position *</label>
        <input name="position" required>
    </div>

    <div>
        <label>Salary (₦) *</label>
        <input type="number" name="amount_of_salary" required>
    </div>

    <div>
        <label>Date of Employment</label>
        <input type="date" name="date_of_employment">
    </div>

    <div class="form-section-title">Bank Details</div>

    <div>
        <label>Bank Name</label>
        <input name="bank_name">
    </div>

    <div>
        <label>Account Number *</label>
        <input id="acc" name="bank_account">
    </div>

    <div>
        <label>Account Name</label>
        <input name="bank_account_name">
    </div>

</div>

<!-- BUTTONS -->
<div class="form-submit no-print">
    <button type="button" onclick="window.print()">Print</button>
    <button type="submit">Register Worker</button>
</div>

</form>

</div>

<!-- ================= SCRIPT ================= -->
<script>

// PASSPORT PREVIEW
document.getElementById('passport').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(file){
        document.getElementById('passportPreview').src = URL.createObjectURL(file);
    }
});

// AGE CALCULATION
document.getElementById('dob').addEventListener('change', function(){
    let dob = new Date(this.value);
    let age = new Date().getFullYear() - dob.getFullYear();
    document.getElementById('ageDisplay').innerText = age;
});

// NIN VALIDATION (basic smart check)
document.getElementById('nin').addEventListener('input', function(){
    let val = this.value;

    if(val.length === 11 && /^\d+$/.test(val)){
        this.classList.add("valid");
        this.classList.remove("invalid");
        document.getElementById("ninStatus").innerText = "Valid Format";
    } else {
        this.classList.add("invalid");
        this.classList.remove("valid");
        document.getElementById("ninStatus").innerText = "Invalid NIN";
    }
});

// ACCOUNT VALIDATION
document.getElementById('acc').addEventListener('input', function(){
    if(this.value.length >= 10){
        this.style.border = "2px solid green";
    } else {
        this.style.border = "2px solid red";
    }
});

</script>

</body>
</html>
